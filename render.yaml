services:
  - type: web
    name: SherrByte-v3
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROK_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: OPENWEATHER_KEY
        sync: false
